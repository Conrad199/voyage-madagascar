<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion Administrateur - Voyage Madagascar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-bg {
      /* Emplacement de votre image – modifiez le chemin selon votre projet */
      background: url('../images/imageC.jpg') no-repeat center center/cover;
      height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.4) 100%);
    }
    .login-card {
      position: relative;
      z-index: 2;
      background: rgba(20, 20, 20, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid #5a4a32;
      border-radius: 15px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      color: #fff;
      box-shadow: 0 15px 35px rgba(0,0,0,0.8);
    }
    .login-card h3 {
      font-weight: 600;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    .form-control {
      background: #1e1e1e;
      border: 1px solid #5a4a32;
      color: #ffffff;            /* Texte saisi en BLANC */
      border-radius: 8px;
      padding: 12px;
      font-size: 1rem;
    }
    .form-control::placeholder {
      color: #b0a590;           /* Placeholder visible (beige clair) */
      opacity: 1;               /* Assure la visibilité sur certains navigateurs */
    }
    .form-control:focus {
      background: #2a2a2a;
      border-color: #b68b40;
      color: #ffffff;            /* Reste blanc même au focus */
      box-shadow: none;
    }
    .btn-primary {
      background: #8b5a2b;
      border: none;
      padding: 12px;
      font-weight: 600;
      width: 100%;
      border-radius: 8px;
      color: white;
    }
    .btn-primary:hover {
      background: #a56e3a;
    }
    .alert-danger {
      background: #3a1e1e;
      border: 1px solid #8b3a3a;
      color: #f8d7da;
    }
  </style>
</head>
<body>
  <div class="login-bg">
    <div class="overlay"></div>
    <div class="login-card">
      <h3><i class="bi bi-shield-lock-fill me-2"></i>Accès Administration</h3>
      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="email" placeholder="admin@voyage.mg" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Mot de passe</label>
          <input type="password" class="form-control" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary">Se connecter</button>
      </form>
      <div id="message" class="mt-3 text-center"></div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('adminToken', data.token);
          window.location.href = 'admin.html';
        } else {
          document.getElementById('message').innerHTML = '<div class="alert alert-danger">Identifiants incorrects</div>';
        }
      } catch (err) {
        document.getElementById('message').innerHTML = '<div class="alert alert-danger">Erreur serveur</div>';
      }
    });
  </script>
</body>
</html>
